services:

  app:

    build: .

    container_name: flask-app

    env_file:
      - .env

    ports:
      - "5000:5000"

    restart: unless-stopped

  nginx:

    image: nginx:latest

    container_name: nginx-server

    ports:
      - "8080:80"

    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - app

    restart: unless-stopped